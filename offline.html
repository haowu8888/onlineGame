<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0e1a">
  <title>离线 - 仙界游坊</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    .offline-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .offline-card{max-width:520px;width:100%;background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:24px;text-align:center}
    .offline-icon{font-size:48px;margin-bottom:12px}
    .offline-title{font-family:var(--font-display);font-size:1.4rem;color:var(--gold);margin-bottom:8px}
    .offline-desc{color:var(--text-secondary);margin-bottom:16px}
    .offline-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  </style>
</head>
<body>
  <div class="offline-wrap">
    <div class="offline-card">
      <div class="offline-icon">📴</div>
      <div class="offline-title">当前处于离线状态</div>
      <div class="offline-desc">如果你之前已打开过本项目，部分页面仍可离线访问。请检查网络后重试。</div>
      <div class="offline-actions">
        <a class="btn btn-gold" href="./index.html">返回首页</a>
        <button class="btn btn-outline" onclick="location.reload()">重试</button>
      </div>
    </div>
  </div>
</body>
</html>
