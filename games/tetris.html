<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天降奇石 - 仙界游坊</title>
  <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="stylesheet" href="../css/tetris.css">
</head>
<body>
  <div class="particles-container" id="particles"></div>
  <div class="page-wrapper">
    <div class="game-container">
      <div class="game-header">
        <h1 class="game-title">天降奇石</h1>
        <div class="game-actions">
          <button class="btn btn-gold btn-sm" id="btn-start">开始</button>
          <button class="btn btn-outline btn-sm" id="btn-pause">暂停</button>
        </div>
      </div>
      <div class="tetris-wrapper">
        <div class="tetris-sidebar">
          <div class="info-box">
            <div class="info-box-label">分数</div>
            <div class="info-box-value" id="score">0</div>
          </div>
          <div class="info-box">
            <div class="info-box-label">等级</div>
            <div class="info-box-value" id="level">1</div>
          </div>
          <div class="info-box">
            <div class="info-box-label">消行</div>
            <div class="info-box-value" id="lines">0</div>
          </div>
          <div class="next-preview">
            <div class="next-preview-label">下一个</div>
            <canvas class="next-canvas" id="next-canvas" width="100" height="100"></canvas>
          </div>
        </div>
        <div class="tetris-main">
          <canvas class="tetris-canvas" id="tetris-canvas" width="250" height="500"></canvas>
          <div class="tetris-overlay" id="overlay">
            <div class="tetris-overlay-title" id="overlay-title">天降奇石</div>
            <div class="tetris-overlay-sub" id="overlay-sub">按 开始 按钮或 Enter 键开始</div>
            <button class="btn btn-gold" id="overlay-btn" style="display:none;">再来一局</button>
          </div>
        </div>
      </div>
      <!-- 触控按钮 -->
      <div class="touch-controls" id="touch-controls">
        <div class="touch-controls-row">
          <button class="touch-btn" data-action="rotate">↻</button>
        </div>
        <div class="touch-controls-row">
          <button class="touch-btn" data-action="left">←</button>
          <button class="touch-btn" data-action="down">↓</button>
          <button class="touch-btn" data-action="right">→</button>
        </div>
        <div class="touch-controls-row">
          <button class="touch-btn touch-btn-wide" data-action="drop">瞬降</button>
        </div>
      </div>
      <div class="tetris-controls-hint">
        <strong>←→</strong> 移动 | <strong>↑/W</strong> 旋转 | <strong>↓</strong> 加速 | <strong>空格</strong> 瞬降 | <strong>P</strong> 暂停
      </div>
    </div>
  </div>
  <script src="../js/shared.js"></script>
  <script src="../js/tetris.js"></script>
</body>
</html>
