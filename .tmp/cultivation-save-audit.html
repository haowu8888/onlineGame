<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>cultivation save audit</title></head>
<body>
<iframe id="app" style="width:1280px;height:2200px;border:0;"></iframe>
<pre id="result">running</pre>
<script>
const GAME_URL = 'file:///D:/vscodeApp/onlineGame/.worktrees/browser-audit/games/cultivation.html';
const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
const resultEl = document.getElementById('result');
const frame = document.getElementById('app');
function setResult(data) { resultEl.textContent = JSON.stringify(data, null, 2); document.title = data.ok ? 'PASS' : 'FAIL'; }
async function loadGame() {
  return new Promise((resolve, reject) => {
    const done = () => {
      frame.removeEventListener('load', done);
      resolve({ win: frame.contentWindow, doc: frame.contentDocument });
    };
    frame.addEventListener('load', done, { once: true });
    frame.src = GAME_URL + '?t=' + Date.now();
    setTimeout(() => reject(new Error('load timeout')), 15000);
  });
}
async function waitFor(fn, label, timeout = 15000) {
  const start = Date.now();
  while (Date.now() - start < timeout) {
    const value = fn();
    if (value) return value;
    await sleep(50);
  }
  throw new Error('wait timeout: ' + label);
}
(async () => {
  try {
    let ctx = await loadGame();
    const ls = ctx.win.localStorage;
    Object.keys(ls).filter((k) => k.startsWith('cultivation_save_')).forEach((k) => ls.removeItem(k));
    ctx = await loadGame();
    let { win, doc } = ctx;
    await waitFor(() => doc.querySelector("button[data-create='1']"), 'create slot');
    doc.querySelector("button[data-create='1']").click();
    await waitFor(() => doc.querySelector('#char-name'), 'char name');
    doc.querySelector('#char-name').value = '审计A';
    doc.querySelector('#spirit-roots .spirit-root-option').click();
    doc.querySelector('#sects .sect-option').click();
    doc.querySelector('#btn-create').click();
    await waitFor(() => getComputedStyle(doc.getElementById('cult-game')).display === 'block', 'enter game');
    await sleep(300);
    const storedAfterCreate = JSON.parse(win.localStorage.getItem('cultivation_save_1'));
    if (!storedAfterCreate || storedAfterCreate.name !== '审计A') throw new Error('save slot 1 not created');
    const beforeExit = {
      name: storedAfterCreate.name,
      gold: storedAfterCreate.gold,
      exp: storedAfterCreate.exp,
      hp: storedAfterCreate.hp,
      realm: storedAfterCreate.realm,
    };
    await waitFor(() => doc.querySelector('#btn-back-slots'), 'back slots');
    doc.querySelector('#btn-back-slots').click();
    await sleep(200);
    const exitState = {
      charCreateDisplay: getComputedStyle(doc.getElementById('char-create')).display,
      gameDisplay: getComputedStyle(doc.getElementById('cult-game')).display,
      slotButtons: doc.querySelectorAll('.save-slot').length,
      enterButtonExists: !!doc.querySelector("button[data-enter='1']"),
    };
    if (exitState.gameDisplay !== 'none' || !exitState.enterButtonExists) throw new Error('back to slots failed');
    doc.querySelector("button[data-enter='1']").click();
    await waitFor(() => getComputedStyle(doc.getElementById('cult-game')).display === 'block', 're-enter game');
    await sleep(300);
    const afterReload = {
      name: doc.querySelector('#sb-name')?.textContent || '',
      gold: doc.querySelector('#sb-gold')?.textContent || '',
      exp: doc.querySelector('#sb-exp-text')?.textContent || '',
      hp: doc.querySelector('#sb-hp')?.textContent || '',
      realm: doc.querySelector('#sb-realm')?.textContent || '',
    };
    const storedAfterReload = JSON.parse(win.localStorage.getItem('cultivation_save_1'));
    setResult({
      ok: true,
      beforeExit,
      exitState,
      afterReload,
      storedAfterReload: {
        name: storedAfterReload?.name,
        gold: storedAfterReload?.gold,
        exp: storedAfterReload?.exp,
        hp: storedAfterReload?.hp,
        realm: storedAfterReload?.realm,
      }
    });
  } catch (error) {
    setResult({ ok: false, error: String(error && error.stack || error) });
  }
})();
</script>
</body>
</html>
