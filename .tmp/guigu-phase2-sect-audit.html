<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>guigu phase2 sect audit</title>
</head>
<body>
  <pre id="result">pending</pre>
  <div class="app-loading"><div class="app-loading-spinner"></div></div>
  <div class="particles-container" id="particles"></div>
  <nav class="game-nav">
    <a href="../index.html" class="game-nav-back">&larr; 仙界游戏</a>
    <span class="game-nav-title">鬼谷八荒</span>
  </nav>
  <div class="page-wrapper">
    <div class="game-container">
      <div class="char-create" id="char-create"></div>
      <div class="guigu-game" id="guigu-game" style="display:none;">
        <div class="status-bar" id="status-bar"></div>
        <div class="calendar-bar" id="calendar-bar"></div>
        <div class="news-ticker" id="news-ticker"></div>
        <div class="guigu-tabs" id="guigu-tabs">
          <button class="guigu-tab active" data-tab="overview">总览</button>
          <button class="guigu-tab" data-tab="cultivate">修炼</button>
          <button class="guigu-tab" data-tab="map">大地图</button>
          <button class="guigu-tab" data-tab="adventure">历练</button>
          <button class="guigu-tab" data-tab="npc">人物</button>
          <button class="guigu-tab" data-tab="craft">炼制</button>
          <button class="guigu-tab" data-tab="market">坊市</button>
          <button class="guigu-tab" data-tab="cave">洞府</button>
          <button class="guigu-tab" data-tab="skill">功法</button>
          <button class="guigu-tab" data-tab="sect">宗门</button>
          <button class="guigu-tab" data-tab="inventory">乾坤袋</button>
          <button class="guigu-tab" data-tab="achievement">成就</button>
          <button class="guigu-tab" data-tab="bounty">悬赏</button>
          <button class="guigu-tab" data-tab="mount">坐骑</button>
        </div>
        <div class="guigu-panel active" id="panel-overview" data-panel="overview"></div>
        <div class="guigu-panel" id="panel-cultivate" data-panel="cultivate"></div>
        <div class="guigu-panel" id="panel-map" data-panel="map"></div>
        <div class="guigu-panel" id="panel-adventure" data-panel="adventure"></div>
        <div class="guigu-panel" id="panel-npc" data-panel="npc"></div>
        <div class="guigu-panel" id="panel-craft" data-panel="craft"></div>
        <div class="guigu-panel" id="panel-market" data-panel="market"></div>
        <div class="guigu-panel" id="panel-cave" data-panel="cave"></div>
        <div class="guigu-panel" id="panel-skill" data-panel="skill"></div>
        <div class="guigu-panel" id="panel-sect" data-panel="sect"></div>
        <div class="guigu-panel" id="panel-inventory" data-panel="inventory"></div>
        <div class="guigu-panel" id="panel-achievement" data-panel="achievement"></div>
        <div class="guigu-panel" id="panel-bounty" data-panel="bounty"></div>
        <div class="guigu-panel" id="panel-mount" data-panel="mount"></div>
      </div>
    </div>
  </div>
  <script>
    localStorage.clear();
    localStorage.setItem('phase2_reset_confirmations', JSON.stringify({ guigu: 2 }));
    localStorage.setItem('guide_completed', JSON.stringify({ guigu: true }));
    window.__errors = [];
    window.addEventListener('error', function (event) {
      window.__errors.push(event.message);
    });
    window.addEventListener('unhandledrejection', function (event) {
      window.__errors.push(String(event.reason));
    });
  </script>
  <script src="../js/shared.js" defer></script>
  <script src="../js/guigu.js" defer></script>
  <script>
    function sleep(ms) {
      return new Promise(function (resolve) { setTimeout(resolve, ms); });
    }

    async function waitFor(selector, timeout) {
      var start = Date.now();
      while (Date.now() - start < timeout) {
        var node = document.querySelector(selector);
        if (node) return node;
        await sleep(50);
      }
      return null;
    }

    async function createCharacter() {
      await waitFor('[data-action="new"]', 4000);
      document.querySelector('[data-action="new"][data-slot="0"]')?.click();
      await sleep(120);
      document.getElementById('create-name').value = '宗门审计';
      document.getElementById('create-next')?.click();
      await sleep(120);
      document.querySelector('.spirit-root-option')?.click();
      await sleep(80);
      document.getElementById('create-next')?.click();
      await sleep(120);
      document.querySelector('.sect-option')?.click();
      await sleep(80);
      document.getElementById('create-next')?.click();
      await sleep(120);
      var firstTalent = document.querySelector('.talent-option:not(.disabled)');
      firstTalent?.click();
      await sleep(100);
      var secondTalent = document.querySelector('.talent-option:not(.disabled):not(.selected)');
      secondTalent?.click();
      await sleep(60);
      document.getElementById('create-next')?.click();
      await sleep(120);
      document.querySelector('.personality-option')?.click();
      await sleep(80);
      document.getElementById('create-next')?.click();
      await sleep(120);
      document.getElementById('create-confirm')?.click();
      await sleep(360);
      document.querySelector('[data-month-focus="sect"]')?.click();
      await sleep(240);
    }

    async function runAudit() {
      await createCharacter();
      document.querySelector('.guigu-tab[data-tab="sect"]')?.click();
      await sleep(200);

      var game = window.__guiguGame;
      var oldOrder = game && game.state && game.state.sectPressure ? game.state.sectPressure.currentOrder : null;
      if (game && oldOrder) {
        game.state.gold = Math.max(game.state.gold, 9999);
        game.state.day = 30;
        game.state.monthlyStats = game.state.monthlyStats || {};
        game.state.monthlyStats[oldOrder.metric] = oldOrder.target;
        game.advanceDays(1);
      }
      await sleep(260);
      document.querySelector('.guigu-tab[data-tab="sect"]')?.click();
      await sleep(200);

      var nextOrder = game && game.state && game.state.sectPressure ? game.state.sectPressure.currentOrder : null;
      var summary = game && game.state ? game.state.lastMonthSummary : null;
      var result = {
        gameExposed: !!game,
        orderId: oldOrder ? oldOrder.id : null,
        pressureValue: game && game.state && game.state.sectPressure ? game.state.sectPressure.pressure : null,
        summarySuccess: !!(summary && summary.sectOrderSuccess === true),
        nextOrderId: nextOrder ? nextOrder.id : null,
        pressureVisible: !!document.querySelector('[data-sect-pressure-value]'),
        orderVisible: !!document.querySelector('[data-sect-order-id]'),
        errors: window.__errors
      };
      result.pass =
        result.gameExposed &&
        !!result.orderId &&
        result.pressureVisible &&
        result.orderVisible &&
        result.summarySuccess &&
        !!result.nextOrderId &&
        result.nextOrderId !== result.orderId &&
        result.errors.length === 0;
      document.getElementById('result').textContent = JSON.stringify(result, null, 2);
    }

    window.addEventListener('load', function () {
      setTimeout(function () {
        runAudit().catch(function (error) {
          window.__errors.push(String(error));
          document.getElementById('result').textContent = JSON.stringify({ pass: false, errors: window.__errors }, null, 2);
        });
      }, 150);
    });
  </script>
</body>
</html>
